{% extends "base.html" %}
{% block title %}Admin - Manage Talents{% endblock %}
{% block content %}
<div>
  <h2>Admin - Manage Talents</h2>
  <table>
    <thead>
      <tr>
        <th>Username</th>
        <th>Email</th>
        <th>Skills</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for talent in talents %}
      <tr>
        <td>{{ talent.user.username }}</td>
        <td>{{ talent.user.email }}</td>
        <td>{{ talent.skills }}</td>
        <td>
          <form action="{{ url_for('main.delete_talent', id=talent.id) }}" method="POST" style="display:inline;">
            <button type="submit" onclick="return confirm('Are you sure you want to delete this profile?');">Delete</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
