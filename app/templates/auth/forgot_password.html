{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto;">
  <h4>Forgot Password</h4>
  <p style="font-size: 0.9rem; color: #666;">Enter your email to receive a password reset link.</p>
  <form method="POST" class="needs-validation" novalidate>
    <div>
      <label>Email Address</label>
      <input type="email" name="email"
        class="{% if errors.email %}is-invalid{% endif %}"
        value="{{ request.form.get('email', '') }}" required>
      <div class="invalid-feedback">
        {% if errors.email %}{{ errors.email }}{% else %}Email is required.{% endif %}
      </div>
    </div>
    <button type="submit" style="width: 100%;">Send Reset Link</button>
  </form>
  <p style="font-size: 0.9rem; margin-top: 15px; text-align: center;">
    Remembered it? <a href="{{ url_for('auth.login') }}">Back to log in</a>
  </p>
</div>
{% endblock %}
